[general]
hide_overlay_in_screen_share = true
passthrough_unbounded_keys = true
should_exit_after_passthrough = true

[hotkeys]
"Ctrl+K" = "scroll"
"Ctrl+J" = "recursive_grid --action left_click"
"Shift+Space" = "recursive_grid --action left_click --repeat"


[action.key_bindings]
left_click = "Return"
right_click = "Ctrl+R"
middle_click = "Ctrl+M"
# mouse_down = "Shift+D"
# mouse_up = "Shift+U"
# mouse_move_up = "Up"
# mouse_move_down = "Down"
# mouse_move_left = "Left"
# mouse_move_right = "Right"

[recursive_grid]
auto_exit_actions = []
min_size_width = 10
min_size_height = 10
reset_key = ","
max_depth = 2
#                                                               
# 5x5 greed
#speed_run
# keys = "qweasdzxcrfvtgbyhnujmikol"
keys = "qwertasdfghjklnzxcvbyuiop"
#for memory
# keys = "qwertyuiopasdfghjklnzxcvb"
grid_cols = 5
grid_rows = 5
# was
# keys = "qwertyuiopasdfghjklzxcvbn"

# y9san9's keys
# keys = "asdfghjklqwertyuiopzxcvbnm,./;"
#                                                               
# # 5x3 greed
# grid_cols = 5
# grid_rows = 3
# keys = "ertyudfghjcvbnm"
#                                                               

[recursive_grid.ui]
sub_key_preview = true
font_size = 16
sub_key_preview_font_size = 12
sub_key_preview_text_color_light = "#FFFF0000"
sub_key_preview_text_color_dark = "#FFFF0000"

line_color_light = "#00000000"
text_color_light = "#FFFF0000"
highlight_color_light = "#22FFFFFF"

line_color_dark = "#00000000"
text_color_dark = "#FFFF0000"
highlight_color_dark = "#22FFFFFF"

label_background = true
label_background_color_light = "#FFAAEEFF"
label_background_color_dark = "#FF003554"
label_background_padding_x = -1
label_background_padding_y = -1
label_background_border_radius = -1
label_background_border_width = 1


[scroll]
stay_active_in_background = true

[mode_indicator.ui]
font_size = 4
border_radius = 50
border_color_light = "#00000000"
border_color_dark = "#00000000"
border_width = 0
padding_x = -1
padding_y = -1
indicator_x_offset = 10
indicator_y_offset = -20

[mode_indicator.scroll]
enabled = true
text = " "
background_color_light = "#FF00CF55"
background_color_dark = "#FF00CF55"

[mode_indicator.recursive_grid]
enabled = true
text = " "
background_color_light = "#FFFFCF55"
background_color_dark = "#FFFFCF55"

[systray]
enabled = false
