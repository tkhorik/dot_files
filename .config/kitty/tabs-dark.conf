tab_bar_style separator
tab_separator ""
tab_bar_min_tabs 2

tab_bar_background #11111b
tab_bar_margin_width 0

tab_title_template "{fmt.bg._11111b}{fmt.fg._5c6370}{fmt.fg._cdd6f4}{fmt.bg._5c6370} ({index}) {title} {fmt.fg._5c6370}{fmt.bg._11111b}{fmt.fg._11111b}{fmt.bg._11111b} "

active_tab_title_template "{fmt.bg._11111b}{fmt.fg._BAA0E8}{fmt.fg._1e1e2e}{fmt.bg._BAA0E8} ({index}) {title} {fmt.fg._BAA0E8}{fmt.bg._11111b}{fmt.fg._11111b}{fmt.bg._11111b} "

active_tab_font_style bold

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward
