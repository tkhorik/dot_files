tab_bar_style separator
tab_separator ""
tab_bar_min_tabs 2

tab_title_template "{fmt.fg._8c8fa1}{fmt.bg._eff1f5}{fmt.fg._4c4f69}{fmt.bg._ccd0da} ({index}) {title} {fmt.fg._ccd0da}{fmt.bg._eff1f5} "

active_tab_title_template "{fmt.fg._8839ef}{fmt.bg._eff1f5}{fmt.fg._eff1f5}{fmt.bg._8839ef} ({index}) {title} {fmt.fg._8839ef}{fmt.bg._eff1f5} "

active_tab_font_style bold

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward
